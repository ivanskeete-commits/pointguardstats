<!DOCTYPE html>
<html>
<head>
    <title>Point Guard Stat Tracker</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        .stat-box { margin: 20px; font-size: 24px; }
        .grade { font-size: 48px; font-weight: bold; margin: 20px; }
        button { font-size: 20px; padding: 10px 20px; margin: 5px; cursor: pointer; }
        .history { margin-top: 40px; text-align: left; display: inline-block; }
        table { border-collapse: collapse; width: 100%; margin-top: 10px; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
        th { background: #eee; }
    </style>
</head>
<body>

    <h1>PG Stat Tracker</h1>

    <div class="stat-box">
        Paint Touches: <span id="pt">0</span><br>
        <button onclick="update('pt', 1)">+</button>
        <button onclick="update('pt', -1)">-</button>
    </div>

    <div class="stat-box">
        Points: <span id="pts">0</span><br>
        <button onclick="update('pts', 1)">+</button>
        <button onclick="update('pts', -1)">-</button>
    </div>

    <div class="stat-box">
        Assists: <span id="ast">0</span><br>
        <button onclick="update('ast', 1)">+</button>
        <button onclick="update('ast', -1)">-</button>
    </div>

    <div class="stat-box">
        Rebounds: <span id="reb">0</span><br>
        <button onclick="update('reb', 1)">+</button>
        <button onclick="update('reb', -1)">-</button>
    </div>

    <div class="grade" id="grade">C</div>

    <button onclick="saveGame()" style="background-color: #4CAF50; color: white;">Save Game</button>

    <div class="history">
        <h3>Season History</h3>
        <table id="historyTable">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>PT</th>
                    <th>PTS</th>
                    <th>AST</th>
                    <th>REB</th>
                    <th>Grade</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script>
        let stats = { pt: 0, pts: 0, ast: 0, reb: 0 };

        function update(stat, amt) {
            stats[stat] = Math.max(0, stats[stat] + amt);
            document.getElementById(stat).innerText = stats[stat];
            calculateGrade();
        }

        function calculateGrade() {
            let grade = "D";
            let pt = stats.pt;
            if (pt >= 15) grade = "A+";
            else if (pt >= 12) grade = "A";
            else if (pt >= 10) grade = "B";
            else if (pt >= 7) grade = "C";
            document.getElementById('grade').innerText = grade;
        }

        function saveGame() {
            let table = document.getElementById("historyTable").getElementsByTagName('tbody')[0];
            let row = table.insertRow(0);
            let date = new Date().toLocaleDateString();
            let grade = document.getElementById('grade').innerText;

            row.insertCell(0).innerText = date;
            row.insertCell(1).innerText = stats.pt;
            row.insertCell(2).innerText = stats.pts;
            row.insertCell(3).innerText = stats.ast;
            row.insertCell(4).innerText = stats.reb;
            row.insertCell(5).innerText = grade;

            // Reset stats for next game
            for (let key in stats) {
                stats[key] = 0;
                document.getElementById(key).innerText = 0;
            }
            calculateGrade();
        }
    </script>

</body>
</html>
