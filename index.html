<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Point Guard Stat Tracker</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .container {
            background-color: #2d2d2d;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 500px;
        }
        h1 { text-align: center; color: #ff9800; }
        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 15px 0;
            padding: 10px;
            background: #3d3d3d;
            border-radius: 8px;
        }
        .stat-name { font-weight: bold; font-size: 1.1em; }
        .controls { display: flex; align-items: center; gap: 15px; }
        button {
            background-color: #ff9800;
            border: none;
            color: white;
            padding: 10px 15px;
            font-size: 1.2em;
            border-radius: 5px;
            cursor: pointer;
        }
        button:active { background-color: #e68a00; }
        .grade-section {
            text-align: center;
            margin-top: 20px;
            padding: 20px;
            border-top: 2px solid #444;
        }
        #grade-display {
            font-size: 3em;
            font-weight: bold;
            color: #4caf50;
        }
        .history-section {
            margin-top: 30px;
            width: 100%;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            text-align: left;
            padding: 8px;
            border-bottom: 1px solid #444;
            font-size: 0.9em;
        }
        th { color: #ff9800; }
        .save-btn {
            width: 100%;
            background-color: #4caf50;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>PG Tracker</h1>

    <div class="stat-row">
        <span class="stat-name">Paint Touches</span>
        <div class="controls">
            <button onclick="changeStat('paintTouches', -1)">-</button>
            <span id="paintTouches">0</span>
            <button onclick="changeStat('paintTouches', 1)">+</button>
        </div>
    </div>

    <div class="stat-row">
        <span class="stat-name">Points</span>
        <div class="controls">
            <button onclick="changeStat('points', -1)">-</button>
            <span id="points">0</span>
            <button onclick="changeStat('points', 1)">+</button>
        </div>
    </div>

    <div class="stat-row">
        <span class="stat-name">Assists</span>
        <div class="controls">
            <button onclick="changeStat('assists', -1)">-</button>
            <span id="assists">0</span>
            <button onclick="changeStat('assists', 1)">+</button>
        </div>
    </div>

    <div class="stat-row">
        <span class="stat-name">Rebounds</span>
        <div class="controls">
            <button onclick="changeStat('rebounds', -1)">-</button>
            <span id="rebounds">0</span>
            <button onclick="changeStat('rebounds', 1)">+</button>
        </div>
    </div>

    <div class="grade-section">
        <div>Performance Grade</div>
        <div id="grade-display">C</div>
        <button class="save-btn" onclick="saveGame()">Save Game to History</button>
    </div>

    <div class="history-section">
        <h3>Season History</h3>
        <table id="history-table">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Full Stat Line (PT-P-A-R)</th>
                    <th>Grade</th>
                </tr>
            </thead>
            <tbody id="history-body">
                </tbody>
        </table>
    </div>
</div>

<script>
    let stats = {
        paintTouches: 0,
        points: 0,
        assists: 0,
        rebounds: 0
    };

    function changeStat(stat, amount) {
        stats[stat] = Math.max(0, stats[stat] + amount);
        document.getElementById(stat).innerText = stats[stat];
        calculateGrade();
    }

    function calculateGrade() {
        const pt = stats.paintTouches;
        let grade = "D";
        let color = "#f44336";

        if (pt >= 15) { grade = "A+"; color = "#gold"; }
        else if (pt >= 12) { grade = "A"; color = "#4caf50"; }
        else if (pt >= 10) { grade = "B"; color = "#8bc34a"; }
        else if (pt >= 7) { grade = "C"; color = "#ffeb3b"; }
        
        const display = document.getElementById('grade-display');
        display.innerText = grade;
        display.style.color = color;
    }

    function saveGame() {
        const tableBody = document.getElementById('history-body');
        const date = new Date().toLocaleDateString();
        const grade = document.getElementById('grade-display').innerText;
        
        // Create the full stat line string
        const statLine = `${stats.paintTouches} PT | ${stats.points} PTS | ${stats.assists} AST | ${stats.rebounds} REB`;

        const row = document.createElement('tr');
        row.innerHTML = `
            <td>${date}</td>
            <td>${statLine}</td>
            <td>${grade}</td>
        `;

        tableBody.prepend(row);

        // Reset stats for next game
        for (let key in stats) {
            stats[key] = 0;
            document.getElementById(key).innerText = 0;
        }
        calculateGrade();
    }
</script>

</body>
</html>
